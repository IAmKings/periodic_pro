name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build Release & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret not set. Generate and upload keystore first."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          if [ ! -s release.keystore ]; then
            echo "::error::release.keystore is empty or corrupted. Check KEYSTORE_BASE64 secret."
            exit 1
          fi

      - name: Verify keystore
        run: |
          keytool -list -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" 2>&1 | head -5

      - name: Assemble Release
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          cp app/build/outputs/apk/release/app-release.apk "PeriodicPro-v${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Periodic Pro ${{ github.ref_name }}"
          body: |
            ## Periodic Pro ${{ github.ref_name }}

            周期表 Pro — Android Jetpack Compose 客户端。

            ### 技术栈
            Kotlin / Compose Material 3 / Koin / DataStore / Haze

            ### 安装
            下载 APK 文件，在 Android 设备上安装（需允许未知来源）。
          files: PeriodicPro-v*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
