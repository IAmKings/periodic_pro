name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build Release & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Assemble Release
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          cp app/build/outputs/apk/release/app-release.apk "PeriodicPro-v${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Periodic Pro ${{ github.ref_name }}"
          body: |
            ## Periodic Pro ${{ github.ref_name }}

            周期表 Pro — Android Jetpack Compose 客户端。

            ### 技术栈
            Kotlin / Compose Material 3 / Koin / DataStore / Haze

            ### 安装
            下载 APK 文件，在 Android 设备上安装（需允许未知来源）。
          files: PeriodicPro-v*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
